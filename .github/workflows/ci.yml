name: CI

on:
  push:
    branches: [dev]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      # Fails the build on high/critical vulnerabilities only — moderate ones
      # (currently just the legacy aws-sdk v2 client, pending a v3 migration)
      # don't block CI, but nothing worse is allowed to land unnoticed
      - name: Audit dependencies
        working-directory: backend
        run: npm audit --audit-level=high

      - name: Run tests with coverage
        working-directory: backend
        env:
          NODE_ENV: test
          JWT_SECRET: ci-test-secret-key
          AWS_S3_BUCKET: ci-test-bucket
          AWS_REGION: eu-north-1
          FRONTEND_URL: http://localhost:3000
        run: npm test

  frontend:
    name: Frontend tests + type check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Audit dependencies
        working-directory: frontend
        run: npm audit --audit-level=high

      - name: TypeScript type check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Run unit tests
        working-directory: frontend
        run: npm test

  e2e:
    name: End-to-end tests (Playwright)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      # Both configured projects (chromium, mobile) run on the Chromium
      # engine, so only that browser needs installing
      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      # All API calls are mocked at the browser network layer (see
      # e2e/helpers/mock-api.ts) — no backend or database needed here.
      # VITE_ADMIN_KEY matches what the admin login tests hardcode.
      - name: Run E2E tests
        working-directory: frontend
        env:
          VITE_ADMIN_KEY: charlemont2026
        run: npx playwright test --grep-invert screenshot

      - name: Upload failure diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: frontend/test-results/
          retention-days: 7
